<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#ef4444">
<link rel="icon" type="image/webp" href="/logo.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>Suneo Island</title>
<style>
:root {
  --bg: #f7f8fa;
  --bg-2: #ffffff;
  --bg-3: #eff1f5;
  --border: #e6e8ee;
  --border-hi: #cdd2dd;
  --text: #1a2340;
  --text-dim: #5a6478;
  --text-faint: #97a0b3;
  --accent: #ef4444;
  --accent-2: #f97316;
  --grad: linear-gradient(135deg, #ef4444, #f97316);
  --radius: 14px;
  --shadow: 0 14px 32px rgba(23, 32, 58, 0.13);
}
@keyframes gradShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scrollbar-color: var(--border-hi) var(--bg); }
body {
  font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
  background:
    radial-gradient(700px 380px at 88% -60px, rgba(249, 115, 22, 0.06), transparent 70%),
    radial-gradient(700px 380px at 8% -60px, rgba(59, 130, 246, 0.06), transparent 70%),
    var(--bg);
  color: var(--text);
  min-height: 100vh;
}
button { font-family: inherit; }

/* ---------- Header ---------- */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
header::before {
  content: ''; display: block; height: 3px;
  background: linear-gradient(90deg, #ef4444, #f97316, #3b82f6, #ef4444);
  background-size: 300% 100%;
  animation: gradShift 8s linear infinite;
}
.header-inner {
  max-width: 1500px; margin: 0 auto;
  padding: 13px 20px;
  display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; user-select: none; white-space: nowrap;
}
.brand .logo {
  width: 40px; height: 40px; border-radius: 50%;
  object-fit: cover; display: block;
  border: 2px solid #fff;
  box-shadow: 0 0 0 2px var(--accent), 0 4px 12px rgba(239, 68, 68, 0.28);
  transition: transform 0.2s;
}
.brand:hover .logo { transform: scale(1.08) rotate(-4deg); }
.brand h1 {
  font-size: 1.3rem; font-weight: 800; letter-spacing: -0.03em;
  background: var(--grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
#search-form {
  display: flex; gap: 8px; flex: 1; min-width: 260px; position: relative;
}
.search-box {
  position: relative; flex: 1; display: flex; align-items: center;
}
.search-box svg {
  position: absolute; left: 12px; width: 16px; height: 16px;
  stroke: var(--text-faint); pointer-events: none;
}
#search-input {
  width: 100%; padding: 11px 38px 11px 38px;
  border: 1px solid var(--border); border-radius: 999px;
  background: var(--bg-3); color: var(--text);
  font-size: 14px; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
}
#search-input:focus {
  background: var(--bg-2);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
}
.search-box svg { left: 15px; }
#search-clear {
  position: absolute; right: 8px;
  background: none; border: none; color: var(--text-faint);
  font-size: 16px; cursor: pointer; padding: 4px; display: none;
}
#search-clear:hover { color: var(--text); }
#suggest {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: var(--shadow);
  overflow: hidden; display: none; z-index: 110;
}
#suggest .s-item {
  padding: 9px 14px; font-size: 14px; cursor: pointer;
  display: flex; justify-content: space-between; gap: 10px;
}
#suggest .s-item:hover, #suggest .s-item.sel { background: var(--bg-3); }
#suggest .s-item .cnt { color: var(--text-faint); font-size: 12px; }
select {
  padding: 10px 14px; border: 1px solid var(--border); border-radius: 999px;
  background: var(--bg-2); color: var(--text); font-size: 13px;
  font-weight: 500; outline: none; cursor: pointer;
}
select:focus { border-color: var(--accent); }
.btn-primary {
  padding: 11px 26px; border: none; border-radius: 999px;
  background: var(--grad); color: #fff;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 3px 12px rgba(239, 68, 68, 0.3);
}
.btn-primary:hover { box-shadow: 0 5px 20px rgba(249, 115, 22, 0.4); }
.btn-primary:active { transform: scale(0.97); }

/* ---------- Nav row: menus + category chips ---------- */
.nav-row {
  max-width: 1500px; margin: 0 auto;
  padding: 8px 20px 12px;
  display: flex; gap: 8px; align-items: center;
}
#cats {
  flex: 1; min-width: 0;
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none;
}
#cats::-webkit-scrollbar { display: none; }
.menu-wrap { position: relative; flex: 0 0 auto; }
.menu-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 15px; border-radius: 999px;
  background: var(--text); border: 1px solid var(--text);
  color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
}
.menu-btn:hover, .menu-btn.open { background: var(--accent); border-color: var(--accent); }
.menu-btn .caret { font-size: 9px; opacity: 0.7; }
.menu-panel {
  position: absolute; top: calc(100% + 8px); left: 0;
  width: min(560px, 90vw); max-height: 62vh; overflow-y: auto;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 14px; box-shadow: var(--shadow);
  padding: 12px; display: none; z-index: 150;
}
.menu-panel.open { display: block; }
.panel-title {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-faint);
  padding: 2px 6px 10px;
}
.panel-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 4px;
}
.panel-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border: none; border-radius: 9px;
  background: none; color: var(--text); font-size: 13px;
  font-weight: 500; cursor: pointer; text-align: left;
  transition: background 0.12s;
  min-width: 0;
}
.panel-item:hover { background: var(--bg-3); }
.panel-item.active { background: var(--accent); color: #fff; }
.panel-item .flag { font-size: 17px; flex: 0 0 auto; }
.panel-item .lbl {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.panel-item img.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  object-fit: cover; flex: 0 0 auto; background: var(--bg-3);
}
.panel-item .sub {
  display: block; font-size: 11px; color: var(--text-faint);
  font-weight: 400;
}
.panel-item.active .sub { color: rgba(255, 255, 255, 0.8); }
.panel-more {
  display: block; width: 100%; margin-top: 8px;
  padding: 9px; border: 1px solid var(--border); border-radius: 9px;
  background: var(--bg-2); color: var(--text-dim);
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.panel-more:hover { border-color: var(--accent); color: var(--accent); }
.panel-note {
  padding: 4px 6px 8px; font-size: 11.5px; color: var(--text-faint);
}
.chip {
  flex: 0 0 auto;
  padding: 8px 16px; border-radius: 999px;
  background: var(--bg-2); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
  box-shadow: 0 1px 3px rgba(35, 40, 80, 0.06);
}
.chip:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
.chip.active {
  background: var(--grad); border-color: transparent;
  color: #fff; box-shadow: 0 3px 12px rgba(239, 68, 68, 0.35);
}

/* ---------- Main / grid ---------- */
main { max-width: 1500px; margin: 0 auto; padding: 8px 20px 40px; }
.result-bar {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 12px; padding: 16px 2px 16px;
}
#result-info {
  font-size: 20px; font-weight: 800; letter-spacing: -0.02em;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#page-info { font-size: 13px; color: var(--text-faint); flex: 0 0 auto; }
#results {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
}
.card {
  border-radius: var(--radius); overflow: hidden; cursor: pointer;
  background: var(--bg-2); border: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(23, 32, 58, 0.06);
  display: flex; flex-direction: column;
  transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
}
.card:hover {
  transform: translateY(-4px);
  border-color: var(--border-hi);
  box-shadow: var(--shadow);
}
.card .thumb {
  position: relative; aspect-ratio: 16/10;
  background: var(--bg-3); overflow: hidden;
}
.card .thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.35s ease;
}
.card:hover .thumb img { transform: scale(1.05); }
.card .badges {
  position: absolute; top: 8px; left: 8px; right: 8px;
  display: flex; justify-content: space-between; pointer-events: none;
}
.badge {
  background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(4px);
  padding: 3px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 600; color: #fff;
  display: flex; align-items: center; gap: 4px;
}
.badge.hd { color: #6ee7a0; }
.card .play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0, 0, 0, 0.3);
  opacity: 0; transition: opacity 0.18s;
}
.card:hover .play-overlay { opacity: 1; }
.play-circle {
  width: 54px; height: 54px; border-radius: 50%;
  background: rgba(255, 255, 255, 0.14);
  backdrop-filter: blur(6px); border: 2px solid rgba(255, 255, 255, 0.4);
  display: flex; align-items: center; justify-content: center;
  color: #fff; transition: transform 0.15s;
}
.card:hover .play-circle { transform: scale(1.08); }
.play-circle svg { width: 20px; height: 20px; fill: #fff; margin-left: 3px; }
.card .info {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px; padding: 11px 12px 12px;
}
.card .meta { min-width: 0; flex: 1; }
.card .title {
  font-size: 13.5px; font-weight: 600; color: var(--text);
  line-height: 1.35;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card .stats {
  font-size: 12px; color: var(--text-faint); margin-top: 3px;
  display: flex; gap: 10px;
}
.card .dl-btn {
  flex: 0 0 auto;
  width: 32px; height: 32px; border-radius: 9px;
  background: var(--bg-3); border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
}
.card .dl-btn:hover { background: var(--accent); transform: scale(1.06); }
.card .dl-btn svg { width: 15px; height: 15px; stroke: var(--text-dim); }
.card .dl-btn:hover svg { stroke: #fff; }

/* ---------- States ---------- */
#loading { text-align: center; padding: 70px 20px; color: var(--text-faint); }
.spinner {
  width: 36px; height: 36px; margin: 0 auto 14px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#error {
  text-align: center; padding: 50px 20px;
  color: #e11d48; font-size: 15px; display: none;
}
#error button {
  display: block; margin: 14px auto 0;
  padding: 8px 20px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg-2); color: var(--text); cursor: pointer; font-size: 13px;
}
#error button:hover { border-color: var(--accent); color: var(--accent); }
.skeleton {
  border-radius: var(--radius); aspect-ratio: 16/12.4;
  border: 1px solid var(--border);
  background: linear-gradient(100deg, var(--bg-3) 40%, #fff 50%, var(--bg-3) 60%);
  background-size: 200% 100%;
  animation: shimmer 1.3s infinite;
}
@keyframes shimmer { to { background-position: -200% 0; } }

#load-more-wrap { text-align: center; padding: 26px 0 10px; }
#load-more {
  padding: 11px 34px; border: 1px solid var(--border); border-radius: 999px;
  background: var(--bg-2); color: var(--text); font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all 0.15s;
}
#load-more:hover { border-color: var(--accent); color: var(--accent); }
#load-more:disabled { opacity: 0.4; cursor: default; }

/* ---------- Player modal ---------- */
#player {
  display: none; position: fixed; inset: 0;
  background: rgba(24, 22, 38, 0.6); z-index: 200;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  align-items: center; justify-content: center;
  animation: fadeIn 0.15s;
}
@keyframes fadeIn { from { opacity: 0; } }
#player.active { display: flex; }
#player .wrap {
  position: relative; width: 94%; max-width: 1000px;
  max-height: 94vh; display: flex; flex-direction: column;
  background: var(--bg-2); border-radius: 16px;
  padding: 14px 16px 16px;
  box-shadow: 0 24px 60px rgba(20, 22, 45, 0.35);
}
#player-video {
  width: 100%; max-height: 72vh;
  border-radius: var(--radius); background: #000; outline: none;
}
#player-iframe {
  width: 100%; aspect-ratio: 16/9; display: none;
  border: none; border-radius: var(--radius); background: #000;
}
.p-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2px 10px;
}
.p-title {
  font-size: 15px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.p-close {
  background: none; border: none; color: var(--text-dim);
  font-size: 28px; line-height: 1; cursor: pointer; padding: 2px 6px;
}
.p-close:hover { color: var(--text); }
.p-bottom {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 12px 2px 0; flex-wrap: wrap;
}
.p-stats { font-size: 13px; color: var(--text-dim); display: flex; gap: 16px; }
.p-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.p-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border: 1px solid var(--border); border-radius: 9px;
  background: var(--bg-2); color: var(--text); font-size: 13px;
  font-weight: 600; cursor: pointer; text-decoration: none;
  transition: border-color 0.15s, background 0.15s;
}
.p-btn:hover { border-color: var(--accent); color: var(--accent); }
.p-btn svg { width: 14px; height: 14px; stroke: currentColor; }
.p-btn.grad { background: var(--grad); border-color: transparent; color: #fff; }
.p-btn.grad:hover { color: #fff; box-shadow: 0 4px 14px rgba(249, 115, 22, 0.4); }
.quality-group { display: flex; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; }
.quality-group button {
  padding: 8px 14px; border: none; background: var(--bg-2);
  color: var(--text-dim); font-size: 12px; font-weight: 700; cursor: pointer;
}
.quality-group button.active { background: var(--grad); color: #fff; }
.dl-menu-wrap { position: relative; }
.dl-menu {
  position: absolute; bottom: calc(100% + 8px); right: 0;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: var(--shadow);
  min-width: 190px; overflow: hidden; display: none; z-index: 210;
}
.dl-menu.open { display: block; }
.dl-menu a {
  display: flex; justify-content: space-between; gap: 12px;
  padding: 10px 14px; font-size: 13px; color: var(--text);
  text-decoration: none;
}
.dl-menu a:hover { background: var(--bg-3); }
.dl-menu a span:last-child { color: var(--text-faint); font-size: 11px; }
.p-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--bg-2); border: 1px solid var(--border);
  color: var(--text); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(20, 22, 45, 0.25);
  transition: background 0.15s, color 0.15s;
}
.p-nav:hover { background: var(--grad); color: #fff; border-color: transparent; }
.p-nav.prev { left: -60px; }
.p-nav.next { right: -60px; }
.p-nav:disabled { opacity: 0.25; cursor: default; }
@media (max-width: 1140px) {
  .p-nav.prev { left: 8px; }
  .p-nav.next { right: 8px; }
}
.p-tags { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 2px 0; }
.p-tag {
  padding: 4px 11px; border-radius: 999px; cursor: pointer;
  background: var(--bg-3); border: 1px solid var(--border);
  font-size: 11.5px; color: var(--text-dim);
  transition: all 0.12s;
}
.p-tag:hover { border-color: var(--accent); color: var(--accent); background: var(--bg-2); }

/* ---------- Toast ---------- */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); border: none;
  padding: 11px 22px; border-radius: 10px; font-size: 13px; color: #fff;
  z-index: 400; display: none; box-shadow: var(--shadow);
}

footer {
  text-align: center; padding: 24px 20px 34px;
  font-size: 12px; color: var(--text-faint);
  border-top: 1px solid var(--border);
}
@media (max-width: 640px) {
  .header-inner { gap: 10px; padding: 10px 12px; }
  .brand h1 { display: none; }
  #results { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  main { padding: 6px 12px 30px; }
  .nav-row { padding: 6px 12px 10px; flex-wrap: wrap; }
  #cats { flex-basis: 100%; order: 10; }
  .menu-panel { position: fixed; left: 12px; right: 12px; width: auto; top: auto; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand" id="brand" title="Home">
      <img class="logo" src="/logo.webp" alt="Suneo Island">
      <h1>Suneo Island</h1>
    </div>
    <form id="search-form" autocomplete="off">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="search-input" placeholder="Search videos, tags, creators...">
        <button type="button" id="search-clear" title="Clear">&times;</button>
        <div id="suggest"></div>
      </div>
      <select id="order-select" title="Sort by">
        <option value="trending">Trending</option>
        <option value="top">Top All Time</option>
        <option value="top7">Top This Week</option>
        <option value="top28">Top This Month</option>
        <option value="latest">Latest</option>
        <option value="score">Top Rated</option>
      </select>
      <button type="submit" class="btn-primary">Search</button>
    </form>
  </div>
  <div class="nav-row">
    <div class="menu-wrap">
      <button class="menu-btn" id="cats-btn">📂 Categories <span class="caret">▼</span></button>
      <div class="menu-panel" id="cats-panel">
        <div class="panel-title">All Categories</div>
        <div class="panel-grid" id="cats-grid"></div>
      </div>
    </div>
    <div class="menu-wrap">
      <button class="menu-btn" id="stars-btn">⭐ Pornstars <span class="caret">▼</span></button>
      <div class="menu-panel" id="stars-panel">
        <div class="panel-title">Top Creators</div>
        <div class="panel-grid" id="stars-grid" style="grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));"></div>
        <button class="panel-more" id="stars-more">Load more creators</button>
      </div>
    </div>
    <div class="menu-wrap">
      <button class="menu-btn" id="region-btn">🌍 All Regions <span class="caret">▼</span></button>
      <div class="menu-panel" id="region-panel">
        <div class="panel-title">Choose Region</div>
        <div class="panel-note">Shows videos tagged with that nationality.</div>
        <div class="panel-grid" id="region-grid"></div>
      </div>
    </div>
    <nav id="cats" aria-label="Categories"></nav>
  </div>
</header>

<main>
  <div class="result-bar">
    <span id="result-info"></span>
    <span id="page-info"></span>
  </div>
  <div id="error"><span id="error-msg"></span><button id="retry-btn">Retry</button></div>
  <div id="results"></div>
  <div id="loading" style="display:none;"><div class="spinner"></div>Loading...</div>
  <div id="load-more-wrap" style="display:none;">
    <button id="load-more">Load more</button>
  </div>
</main>

<footer>Suneo Island — local viewer. Content is streamed from RedGIFs; nothing is hosted here.</footer>

<div id="player" role="dialog" aria-modal="true">
  <div class="wrap">
    <div class="p-top">
      <div class="p-title" id="p-title"></div>

/* ---------------- utilities ---------------- */
function showToast(msg, dur = 2600) {
  const t = $('#toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._hid);
  t._hid = setTimeout(() => t.style.display = 'none', dur);
}
// Only allow http(s) URLs from expected hosts (blocks javascript:/data: URLs)
function safeUrl(url, allowedHost = 'redgifs.com') {
  try {
    const u = new URL(url);
    if (u.protocol !== 'https:' && u.protocol !== 'http:') return '';
    if (u.hostname !== allowedHost && !u.hostname.endsWith('.' + allowedHost)) return '';
    return u.href;
  } catch (_) { return ''; }
}
function fmtNum(n) {
  if (!n && n !== 0) return '';
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(n);
}
function fmtDur(s) {
  if (!s) return '';
  s = Math.round(s);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}
function dlLink(url) { return '/api/download?url=' + encodeURIComponent(url); }

/* ---------------- API ---------------- */
async function apiSearch(text, order, page) {
  // Creator mode: browse one user's uploads instead of tag search
  let url;
  if (state.creator) {
    url = '/api/user/' + encodeURIComponent(state.creator) + '?' +
      new URLSearchParams({ page: String(page), count: '40' });
  } else {
    // Combine region + query: "indian" + "milf" -> "indian milf"
    const q = [state.region, text].filter(Boolean).join(' ').trim() || 'trending';
    url = '/api/search?' +
      new URLSearchParams({ q, order, page: String(page), count: '40' });
  }
  const r = await fetch(url);
  if (!r.ok) {
    let m = 'Search failed (' + r.status + ')';
    try { const e = await r.json(); m = e.error || m; } catch (_) {}
    throw new Error(m);
  }
  return r.json();
}

function appendResults(gifs) {

/* ---------------- search flow ---------------- */
async function loadPage(page, { append = false } = {}) {
  if (state.loading) return;
  state.loading = true;
  $('#error').style.display = 'none';
  if (!append) {
    $('#results').innerHTML = '';
    state.items = [];
    window.scrollTo({ top: 0 });
    showSkeletons();
  } else {
    $('#load-more').disabled = true;
    $('#load-more').textContent = 'Loading...';
  }
  try {
    const data = await apiSearch(state.text, state.order, page);
    clearSkeletons();
    const gifs = data.gifs || [];
    state.page = data.page || page;
    state.pages = data.pages || 1;
    if (!append && !gifs.length) {
      $('#error').style.display = 'block';
      $('#error-msg').textContent = 'No results found. Try a different search.';
    } else {
      appendResults(gifs);
    }
    const regionLabel = state.region
      ? (REGIONS.find(r => r[0] === state.region) || ['', '', state.region])[2]
      : '';
    $('#result-info').textContent = state.creator
      ? '@' + state.creator
      : state.text
        ? 'Results for “' + state.text + '”' + (regionLabel ? ' · ' + regionLabel : '')
        : regionLabel
          ? regionLabel + ' Videos'
          : 'Trending Now';
    $('#page-info').textContent = data.total
      ? fmtNum(data.total) + ' videos' + (state.pages > 1 ? ' · Page ' + state.page : '')
      : '';
    $('#load-more-wrap').style.display = state.page < state.pages ? 'block' : 'none';
  } catch (err) {
    clearSkeletons();
    if (!append) {
      $('#error').style.display = 'block';
      $('#error-msg').textContent = err.message;
    } else {
      showToast(err.message);
    }
  } finally {
    state.loading = false;
    $('#load-more').disabled = false;
    $('#load-more').textContent = 'Load more';
  }
}

function startSearch(text, order) {
  state.text = text.trim();
  state.order = order;
  state.creator = null;   // leaving creator mode on any normal search
  syncChips(state.text);
  loadPage(1);
}

function startCreator(username) {
  state.creator = username;

  $('#search-input').value = '';

}

/* infinite scroll — prefetch next page near the bottom */
const sentinel = $('#load-more-wrap');

  if (entries[0].isIntersecting && !state.loading && state.page < state.pages) {
    loadPage(state.page + 1, { append: true });

}, { rootMargin: '600px' }).observe(sentinel);
$('#load-more').addEventListener('click', () => loadPage(state.page + 1, { append: true }));

/* ---------------- player ---------------- */
const video = $('#player-video');
const iframeEl = $('#player-iframe');
let currentQuality = 'hd';

function sourcesFor(g) {
  return {
    hd: safeUrl(g.urls?.hd || ''),
    sd: safeUrl(g.urls?.sd || ''),
    poster: safeUrl(g.urls?.poster || ''),
    embed: safeUrl(g.urls?.html || '') || 'https://www.redgifs.com/ifr/' + encodeURIComponent(g.id || ''),

}

function openPlayer(idx) {
  const g = state.items[idx];
  if (!g) return;
  state.activeIdx = idx;
  const src = sourcesFor(g);

  $('#p-title').textContent = g.title || (g.userName ? '@' + g.userName : g.id || '');
  const stats = [];
  if (g.views) stats.push('👁 ' + fmtNum(g.views) + ' views');
  if (g.likes) stats.push('❤ ' + fmtNum(g.likes) + ' likes');
  if (g.userName) stats.push('by @' + g.userName);
  $('#p-stats').textContent = stats.join('  ·  ');

  // quality buttons — hide the group if only one source exists
  const qg = $('#quality-group');
  qg.style.display = (src.hd && src.sd) ? 'flex' : 'none';
  currentQuality = src.hd ? 'hd' : 'sd';
  qg.querySelectorAll('button').forEach(b =>
    b.classList.toggle('active', b.dataset.q === currentQuality));

  // download menu with every available source
  const menu = $('#dl-menu');
  menu.innerHTML = '';
  const opts = [
    ['HD Video (MP4)', src.hd, '.mp4', 'best quality'],
    ['SD Video (MP4)', src.sd, '.mp4', 'smaller file'],
    ['Poster (JPG)', src.poster, '.jpg', 'still image'],
  ];
  let hasDl = false;
  opts.forEach(([label, url, ext, note]) => {
    if (!url) return;
    hasDl = true;
    const a = document.createElement('a');
    a.href = dlLink(url);
    a.download = (g.id || 'video') + ext;
    a.innerHTML = '<span></span><span></span>';
    a.children[0].textContent = label;
    a.children[1].textContent = note;
    a.addEventListener('click', () => {
      menu.classList.remove('open');
      showToast('Download started');
    });
    menu.appendChild(a);
  });
  $('#dl-toggle').style.display = hasDl ? '' : 'none';

  $('#player-open').href = src.embed;

  // tags
  const tagsEl = $('#p-tags');
  tagsEl.innerHTML = '';

    const b = document.createElement('button');
    b.className = 'p-tag';
    b.textContent = '#' + tag;
    b.addEventListener('click', () => {
      closePlayer();
      $('#search-input').value = tag;
      startSearch(tag, state.order);
    });
    tagsEl.appendChild(b);
  });

  playSource(src);
  $('#p-prev').disabled = idx <= 0;
  $('#p-next').disabled = idx >= state.items.length - 1;
  $('#player').classList.add('active');
  document.body.style.overflow = 'hidden';

  // auto-fetch next page so "next" keeps working near the end
  if (idx >= state.items.length - 5 && state.page < state.pages && !state.loading) {
    loadPage(state.page + 1, { append: true });
  }
}

// Autoplay applies ONLY to the video open in the player — grid stays static.
function playSource(src) {
  const url = (currentQuality === 'hd' && src.hd) ? src.hd : (src.sd || src.hd);
  if (url) {
    iframeEl.style.display = 'none';
    iframeEl.src = '';
    video.style.display = '';
    if (src.poster) video.poster = src.poster;
    video.src = url;
    video.play().catch(() => { /* browser may require a gesture; controls remain */ });
    video.onerror = () => {
      // signed URL expired or blocked — fall back to the official embed
      video.style.display = 'none';
      video.removeAttribute('src'); video.load();
      iframeEl.style.display = 'block';
      iframeEl.src = src.embed;
    };
  } else {
    video.style.display = 'none';
    iframeEl.style.display = 'block';
    iframeEl.src = src.embed;
  }
}

function closePlayer() {
  video.pause();
  video.removeAttribute('src'); video.load();
  iframeEl.src = '';
  $('#dl-menu').classList.remove('open');
  $('#player').classList.remove('active');
  document.body.style.overflow = '';
  state.activeIdx = -1;
}

function stepPlayer(dir) {
  const next = state.activeIdx + dir;
  if (next >= 0 && next < state.items.length) openPlayer(next);
}

$('#quality-group').addEventListener('click', e => {
  const b = e.target.closest('button');

  const g = state.items[state.activeIdx];
  if (!g) return;
  currentQuality = b.dataset.q;
  $('#quality-group').querySelectorAll('button').forEach(x =>
    x.classList.toggle('active', x === b));
  const t = video.currentTime;
  playSource(sourcesFor(g));
  video.currentTime = t;
});
$('#dl-toggle').addEventListener('click', e => {
  e.stopPropagation();
  $('#dl-menu').classList.toggle('open');
});
document.addEventListener('click', () => $('#dl-menu').classList.remove('open'));
$('#player-close').addEventListener('click', closePlayer);
$('#player').addEventListener('click', e => {
  if (e.target === $('#player')) closePlayer();
});
$('#p-prev').addEventListener('click', () => stepPlayer(-1));
$('#p-next').addEventListener('click', () => stepPlayer(1));

document.addEventListener('keydown', e => {
  if (!$('#player').classList.contains('active')) return;
  if (e.key === 'Escape') closePlayer();
  else if (e.key === 'ArrowLeft') stepPlayer(-1);
  else if (e.key === 'ArrowRight') stepPlayer(1);
  else if (e.key === ' ' && document.activeElement !== video) {
    e.preventDefault();
    video.paused ? video.play() : video.pause();
  }
});

});

    });
    $('#stars-more').style.display =
      (data.page < data.pages) ? 'block' : 'none';
  } catch (_) {
    showToast('Could not load creators');
  } finally {
    starsLoading = false;
    $('#stars-more').textContent = 'Load more creators';
  }
}
$('#stars-btn').addEventListener('click', () => {
  if (starsPage === 0) loadCreators();
});
$('#stars-more').addEventListener('click', loadCreators);

/* Region menu */
(function buildRegionMenu() {
  const grid = $('#region-grid');
  REGIONS.forEach(([tag, flag, label]) => {
    const b = document.createElement('button');
    b.className = 'panel-item' + (tag === '' ? ' active' : '');
    b.dataset.tag = tag;
    const f = document.createElement('span');
    f.className = 'flag';
    f.textContent = flag;
    b.appendChild(f);
    const l = document.createElement('span');
    l.className = 'lbl';
    l.textContent = label;
    b.appendChild(l);
    b.addEventListener('click', () => {
      state.region = tag;
      grid.querySelectorAll('.panel-item').forEach(x =>
        x.classList.toggle('active', x === b));
      $('#region-btn').innerHTML = flag + ' ' + label + ' <span class="caret">▼</span>';
      closeMenus();
      state.creator = null;
      loadPage(1);
    });
    grid.appendChild(b);
  });
})();

/* ---------------- search box extras ---------------- */
const input = $('#search-input');
const suggestBox = $('#suggest');
let suggestTimer = null, suggestSel = -1;

input.addEventListener('input', () => {
  $('#search-clear').style.display = input.value ? 'block' : 'none';
  clearTimeout(suggestTimer);
  const q = input.value.trim();
  if (q.length < 2) { suggestBox.style.display = 'none'; return; }
  suggestTimer = setTimeout(async () => {
    try {
      const r = await fetch('/api/suggest?q=' + encodeURIComponent(q));
      if (!r.ok) return;
      const data = await r.json();
      const raw = Array.isArray(data) ? data : (data.tags || []);
      const tags = raw.slice(0, 8);
      if (!tags.length) { suggestBox.style.display = 'none'; return; }
      suggestBox.innerHTML = '';
      suggestSel = -1;
      tags.forEach(t => {
        const name = t.text || t.name || t;
        const item = document.createElement('div');
        item.className = 's-item';
        const n = document.createElement('span');
        n.textContent = name;
        item.appendChild(n);
        if (t.gifs) {
          const c = document.createElement('span');
          c.className = 'cnt';
          c.textContent = fmtNum(t.gifs);
          item.appendChild(c);
        }
        item.addEventListener('mousedown', e => {
          e.preventDefault();
          input.value = name;
          suggestBox.style.display = 'none';
          startSearch(name, $('#order-select').value);
        });
        suggestBox.appendChild(item);
      });
      suggestBox.style.display = 'block';
    } catch (_) {}
  }, 250);
});
input.addEventListener('blur', () => setTimeout(() => suggestBox.style.display = 'none', 150));
input.addEventListener('keydown', e => {
  const items = suggestBox.querySelectorAll('.s-item');
  if (!items.length || suggestBox.style.display === 'none') return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    suggestSel = e.key === 'ArrowDown'
      ? Math.min(suggestSel + 1, items.length - 1)
      : Math.max(suggestSel - 1, 0);
    items.forEach((it, i) => it.classList.toggle('sel', i === suggestSel));
    if (suggestSel >= 0) input.value = items[suggestSel].firstChild.textContent;
  } else if (e.key === 'Escape') {
    suggestBox.style.display = 'none';
  }
});

$('#search-clear').addEventListener('click', () => {
  input.value = '';
  $('#search-clear').style.display = 'none';
  input.focus();
});
$('#search-form').addEventListener('submit', e => {
  e.preventDefault();
  suggestBox.style.display = 'none';
  startSearch(input.value, $('#order-select').value);
});
$('#order-select').addEventListener('change', () =>
  startSearch(state.text, $('#order-select').value));
$('#brand').addEventListener('click', () => {
  input.value = '';
  $('#order-select').value = 'trending';
  state.region = '';
  state.creator = null;
  $('#region-btn').innerHTML = '🌍 All Regions <span class="caret">▼</span>';
  const rg = $('#region-grid');
  rg.querySelectorAll('.panel-item').forEach(x =>
    x.classList.toggle('active', x.dataset.tag === ''));
  startSearch('', 'trending');
});
$('#retry-btn').addEventListener('click', () => loadPage(state.page || 1));

/* ---------------- init ---------------- */
loadCategories();
startSearch('', 'trending');
</script>
